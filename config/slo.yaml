service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: P95 should stay below 3s during normal traffic; use rag_slow to prove breach behavior.
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Keep user-visible failures under 2%; validate against tool_fail incident.
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Pair with hourly_cost_usd in /metrics to detect sudden burn-rate spikes early.
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: Heuristic quality should remain at or above 0.75 for most requests.
